<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>idle-game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="slots"></div>
    <button data-action="save">Save</button>
  </div>
  <div id="console-bar">
    <div class="console-panel console-panel-status">
      <p class="console-label"><span id="equipped-label">Equipped</span></p>
      <p class="console-value"><span id="equipped-list">—</span></p>
      <p class="console-label"><span id="stats-label">Stats</span></p>
      <p class="console-value"><span id="stats-list">—</span></p>
      <p class="console-value"><span id="status-message">—</span></p>
    </div>
    <div class="console-panel console-panel-inventory">
      <p class="console-label"><span id="inventory-label">Inventory</span></p>
      <div id="inventory-list"></div>
    </div>
    <div class="console-panel console-panel-craft">
      <p class="console-label"><span id="craft-label">Craft</span></p>
      <div id="craft-list"></div>
    </div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
